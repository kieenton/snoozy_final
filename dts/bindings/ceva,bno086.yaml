description: BNO086 IMU

compatible: "ceva,bno086"

include: spi-device.yaml   # this pulls in on-bus: spi automatically

on-bus: spi                  # add this explicitly to be safe

properties:
  spi-max-frequency:
    required: true
  boot-gpios:
    type: phandle-array
    required: false
  int-gpios:
    type: phandle-array
    required: false
  rst-gpios:
    type: phandle-array
    required: false